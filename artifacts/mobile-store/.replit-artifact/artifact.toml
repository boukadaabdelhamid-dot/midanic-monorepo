kind = "mobile"
previewPath = "/mobile-store/"
title = "Midanic Store"
version = "1.0.0"
id = "artifacts/mobile-store"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile-store/" ]
localPort = 19558

[services.development]
run = "pnpm --filter @workspace/mobile-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile-store", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile-store", "run", "serve" ]

[services.env]
PORT = "19558"
BASE_PATH = "/mobile-store/"
