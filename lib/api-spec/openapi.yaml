            application/json:
              schema:
                $ref: "#/components/schemas/StockTransfer"

  /erp/transfers/{id}/prepare:
    post:
      operationId: prepareErpTransfer
      tags: [erp]
      summary: Mark items prepared & decrement source stock (source side)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockTransferActionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockTransfer"

  /erp/transfers/{id}/ship:
    post:
      operationId: shipErpTransfer
      tags: [erp]
      summary: Mark prepared transfer as in transit (source side)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockTransferActionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockTransfer"

  /erp/transfers/{id}/receive:
    post:
      operationId: receiveErpTransfer
      tags: [erp]
      summary: Mark items received & increment destination stock (destination side)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockTransferActionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockTransfer"

  /erp/transfers/{id}/cancel:
    post:
      operationId: cancelErpTransfer
      tags: [erp]
      summary: Cancel a transfer (source side; restocks if already prepared)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockTransferActionRequest"
      responses:
        "200":
          description: Updated
