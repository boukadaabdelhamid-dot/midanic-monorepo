            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockTransferActionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockTransfer"

  /erp/transfers/{id}/reject:
    post:
      operationId: rejectErpTransfer
      tags: [erp]
      summary: Reject a requested transfer (destination side)
      security:
        - bearerAuth: []
      parameters:
        - in: path
