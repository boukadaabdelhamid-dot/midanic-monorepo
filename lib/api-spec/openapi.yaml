  # ── ERP: Caisses (virtual cashboxes) ─────────────────────────────
  /erp/caisses:
    get:
      operationId: getErpCaisses
      tags: [erp]
      summary: List caisses visible to current user in current store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Caisses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaisseSummary"

  /erp/caisses/reports:
    get:
      operationId: getErpCaisseReports
      tags: [erp]
      summary: Per-staff caisse activity report aggregated over a date range (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          description: "Start of range (inclusive). YYYY-MM-DD or ISO datetime. Defaults to start of today."
          schema: { type: string }
        - in: query
          name: to
          description: "End of range. If YYYY-MM-DD it is treated as inclusive end-of-day. Defaults to start of tomorrow."
          schema: { type: string }
      responses:
        "200":
          description: Aggregated activity per staff caisse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaisseReportResponse"

  /erp/caisses/{id}:
    get:
      operationId: getErpCaisse
      tags: [erp]
      summary: Get caisse detail with recent movements
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Caisse detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaisseDetail"

  /erp/caisse-transfers:
    get:
      operationId: getErpCaisseTransfers
      tags: [erp]
      summary: List caisse transfers (inbox / outbox / all)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: box
          schema:
            type: string
            enum: [inbox, outbox, all]
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, accepted, rejected, cancelled]
      responses:
        "200":
          description: Transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaisseTransferSummary"
    post:
      operationId: createErpCaisseTransfer
      tags: [erp]
      summary: Initiate a staff-to-staff caisse transfer (funds held)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaisseTransferRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaisseTransfer"

  /erp/caisse-transfers/{id}/accept:
    post:
      operationId: acceptErpCaisseTransfer
      tags: [erp]
      summary: Recipient accepts a pending transfer
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /erp/caisse-transfers/{id}/reject:
    post:
      operationId: rejectErpCaisseTransfer
      tags: [erp]
      summary: Recipient rejects a pending transfer (funds returned to sender)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /erp/caisse-transfers/{id}/cancel:
    post:
      operationId: cancelErpCaisseTransfer
      tags: [erp]
      summary: Sender cancels a still-pending transfer (funds returned)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /erp/caisse-transfer-recipients:
    get:
      operationId: getErpCaisseTransferRecipients
      tags: [erp]
      summary: List eligible transfer recipients (other staff/admins) in current store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recipients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaisseTransferRecipient"

  /erp/caisses/admin/deposit:
    post:
      operationId: adminDepositErpCaisse
      tags: [erp]
      summary: Admin moves cash from a staff caisse into the store's main caisse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCaisseAmountRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /erp/caisses/admin/withdraw:
    post:
      operationId: adminWithdrawErpCaisse
      tags: [erp]
      summary: Admin moves cash from the main caisse into a staff caisse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCaisseAmountRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /erp/caisses/admin/adjust:
    post:
      operationId: adminAdjustErpCaisse
      tags: [erp]
      summary: Admin applies a signed adjustment to a caisse with a required reason
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCaisseAdjustRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── ERP: CRM ─────────────────────────────────────────────────────
  /erp/customers:
    get:
      operationId: getErpCustomers
      tags: [erp]
      summary: List customers (CRM)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerSummary"
    post:
      operationId: createErpCustomer
      tags: [erp]
      summary: Create a new customer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSummary"

  /erp/customers/{id}:
    get:
      operationId: getErpCustomer
      tags: [erp]
      summary: Get customer detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"

  /erp/staff:
    get:
      operationId: getErpStaff
      tags: [erp]
      summary: List staff (admins and employees)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createErpStaff
      tags: [erp]
      summary: Create a staff account (admin or employee)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /erp/staff/{id}/stores:
    put:
      operationId: setErpStaffStores
      tags: [erp]
      summary: Replace the set of stores a staff member can access
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                storeIds:
                  type: array
                  items: { type: integer }
              required: [storeIds]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /erp/staff/{id}:
    delete:
      operationId: deleteErpStaff
      tags: [erp]
      summary: Delete a staff account
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /erp/customers/{id}/notes:
    post:
      operationId: createCustomerNote
      tags: [erp]
      summary: Add customer note
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
              required: [note]
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerNote"

  # ── Storage ───────────────────────────────────────────────────────
  /uploads/{id}:
    get:
      operationId: getUploadedImage
      tags: [storage]
      summary: Serve a previously uploaded image (public, no auth required)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /uploads:
    post:
      operationId: uploadImage
      tags: [storage]
      summary: Upload an image file (multipart/form-data, admin auth required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "201":
          description: Uploaded image record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedImage"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    GenerateBarcodeResponse:
      type: object
      properties:
        barcode:
          type: string
      required: [barcode]

    # Auth
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        preferredLang:
          type: string
          enum: [ar, en]
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        stores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        currentStoreId:
          type: integer
          nullable: true
      required: [token, user]

    Store:
      type: object
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: string
        slug:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        tvaRate:
          type: string
          nullable: true
        showTvaByDefault:
          type: boolean
          nullable: true
        nif:
          type: string
          nullable: true
        rc:
          type: string
          nullable: true
        ai:
          type: string
          nullable: true
      required: [id, nameAr, nameEn, slug]

    SelectStoreRequest:
      type: object
      properties:
        storeId:
          type: integer
      required: [storeId]

    SelectStoreResponse:
      type: object
      properties:
        token:
          type: string
        currentStoreId:
          type: integer
        store:
          $ref: "#/components/schemas/Store"
      required: [token, currentStoreId, store]

    CreateStoreRequest:
      type: object
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        slug:   { type: string }
        isActive: { type: boolean }
        address: { type: string }
        phone: { type: string }
        logoUrl: { type: string }
        tvaRate: { type: string }
        showTvaByDefault: { type: boolean }
        nif: { type: string }
        rc: { type: string }
        ai: { type: string }
      required: [nameAr, nameEn, slug]

    UpdateStoreRequest:
      type: object
      properties:
        nameAr:   { type: string }
        nameEn:   { type: string }
        isActive: { type: boolean }
        address: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        logoUrl: { type: string, nullable: true }
        tvaRate: { type: string }
        showTvaByDefault: { type: boolean }
        nif: { type: string, nullable: true }
        rc: { type: string, nullable: true }
        ai: { type: string, nullable: true }

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, admin, employee]
        preferredLang:
          type: string
          enum: [ar, en]
        stores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        currentStoreId:
          type: integer
          nullable: true
      required: [id, name, email, role]

    # Products
    Product:
      type: object
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: string
        descriptionAr:
          type: string
        descriptionEn:
          type: string
        price:
          type: string
        imageUrl:
          type: string
          nullable: true
        stock:
          type: integer
        categoryId:
          type: integer
          nullable: true
        rating:
          type: string
        reviewCount:
          type: integer
        createdAt:
          type: string
        reference:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        costPrice:
          type: string
          nullable: true
        catalogueType:
          type: string
          nullable: true
        brand:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        colisage:
          type: integer
          nullable: true
        weight:
          type: string
          nullable: true
        priceGros:
          type: string
          nullable: true
        priceSemiGros:
          type: string
          nullable: true
        priceMin:
          type: string
          nullable: true
        catalogue1:
          type: string
          nullable: true
        catalogue2:
          type: string
          nullable: true
        catalogue3:
          type: string
          nullable: true
        catalogue4:
          type: string
          nullable: true
        catalogue5:
          type: string
          nullable: true
        catalogue6:
          type: string
          nullable: true
        isActive:
          type: boolean
          nullable: true
        isExposed:
          type: boolean
          nullable: true
      required: [id, nameAr, nameEn, price, stock, rating, reviewCount]

    Review:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: integer
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
        userName:
          type: string
          nullable: true
      required: [id, rating]

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            reviews:
              type: array
              items:
                $ref: "#/components/schemas/Review"

    ProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [products, total, page, limit]

    CreateProductRequest:
      type: object
      properties:
        nameAr:
          type: string
        nameEn:
          type: string
        descriptionAr:
          type: string
        descriptionEn:
          type: string
        price:
          type: string
        imageUrl:
          type: string
          nullable: true
        stock:
          type: integer
        categoryId:
          type: integer
          nullable: true
      required: [nameAr, nameEn, price]

    CreateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required: [rating]

    # Categories
    Category:
      type: object
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: string
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, nameAr, nameEn]

    CreateCategoryRequest:
      type: object
      properties:
        nameAr:
          type: string
        nameEn:
          type: string
        imageUrl:
          type: string
          nullable: true
      required: [nameAr, nameEn]

    # Cart
    CartItem:
      type: object
      properties:
        id:
          type: integer
        quantity:
          type: integer
        product:
          type: object
